<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <h1 class="mt-5">Database</h1>
        <h2>Fetch Data</h2>
        <form id="fetchForm">
            <div class="form-group">
                <label for="type">Type:</label>
                <select class="form-control" id="type" name="type">
                    <option value="ORDER_ID">ORDER_ID</option>
                    <option value="PID">PID</option>
                </select>
            </div>
            <div class="form-group">
                <label for="identifier">Identifier:</label>
                <input type="text" class="form-control" id="identifier" name="identifier" required>
            </div>
            <button type="submit" class="btn btn-primary">Fetch</button>
        </form>

        <h2 class="mt-5">Add New Data</h2>
        <form id="addForm">
            <div class="form-group">
                <label for="PID">PID:</label>
                <input type="text" class="form-control" id="PID" name="PID" required>
            </div>
            <div class="form-group">
                <label for="ORDER_ID">ORDER_ID:</label>
                <input type="text" class="form-control" id="ORDER_ID" name="ORDER_ID" required>
            </div>
            <div class="form-group">
                <label for="FIN">FIN:</label>
                <input type="text" class="form-control" id="FIN" name="FIN" required>
            </div>
            <div class="form-group">
                <label for="EN_LOC_NURSE_UNIT_DISP">EN_LOC_NURSE_UNIT_DISP:</label>
                <input type="text" class="form-control" id="EN_LOC_NURSE_UNIT_DISP" name="EN_LOC_NURSE_UNIT_DISP" required>
            </div>
            <div class="form-group">
                <label for="ACCN">ACCN:</label>
                <input type="text" class="form-control" id="ACCN" name="ACCN" required>
            </div>
            <div class="form-group">
                <label for="ORDER_MNEMONIC">ORDER_MNEMONIC:</label>
                <input type="text" class="form-control" id="ORDER_MNEMONIC" name="ORDER_MNEMONIC" required>
            </div>
            <div class="form-group">
                <label for="TASK_ASSAY_CD">TASK_ASSAY_CD:</label>
                <input type="text" class="form-control" id="TASK_ASSAY_CD" name="TASK_ASSAY_CD" required>
            </div>
            <div class="form-group">
                <label for="R_TASK_ASSAY_DISP">R_TASK_ASSAY_DISP:</label>
                <input type="text" class="form-control" id="R_TASK_ASSAY_DISP" name="R_TASK_ASSAY_DISP" required>
            </div>
            <div class="form-group">
                <label for="RESULT_VALUE_NUMERIC">RESULT_VALUE_NUMERIC:</label>
                <input type="text" class="form-control" id="RESULT_VALUE_NUMERIC" name="RESULT_VALUE_NUMERIC" required>
            </div>
            <div class="form-group">
                <label for="PERFORM_DT_TM">PERFORM_DT_TM:</label>
                <input type="text" class="form-control" id="PERFORM_DT_TM" name="PERFORM_DT_TM" required>
            </div>
            <button type="submit" class="btn btn-success">Add Data</button>
        </form>

        <div id="result" class="mt-5"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script>
        $(document).ready(function(){
            $('#fetchForm').submit(function(event){
                event.preventDefault();
                const type = $('#type').val();
                const identifier = $('#identifier').val();
                const params = type === 'ORDER_ID' ? { type: type, ORDER_ID: identifier } : { type: type, PID: identifier };

                $.get('/fetch', params, function(data) {
                    if (data.length > 0) {
                        const firstRecord = data[0];
                        let resultHtml = `<div class="mt-4">
                            <p><strong>PID:</strong> ${firstRecord.PID}</p>
                            <p><strong>ORDER_ID:</strong> ${firstRecord.ORDER_ID}</p>
                            <p><strong>FIN:</strong> ${firstRecord.FIN}</p>
                            <p><strong>EN_LOC_NURSE_UNIT_DISP:</strong> ${firstRecord.EN_LOC_NURSE_UNIT_DISP}</p>
                            <p><strong>ACCN:</strong> ${firstRecord.ACCN}</p>
                        </div>`;

                        let table = '<table class="table table-striped mt-4" style="font-size: smaller; white-space: nowrap;"><thead><tr>';
                        table += '<th>ORDER_MNEMONIC</th><th>TASK_ASSAY_CD</th><th>R_TASK_ASSAY_DISP</th>';
                        table += '<th>RESULT_VALUE_NUMERIC</th><th>PERFORM_DT_TM</th></tr></thead><tbody>';
                        data.forEach(record => {
                            table += '<tr>';
                            table += `<td>${record.ORDER_MNEMONIC}</td>`;
                            table += `<td>${record.TASK_ASSAY_CD}</td>`;
                            table += `<td>${record.R_TASK_ASSAY_DISP}</td>`;
                            table += `<td>${record.RESULT_VALUE_NUMERIC}</td>`;
                            table += `<td>${record.PERFORM_DT_TM}</td>`;
                            table += '</tr>';
                        });
                        table += '</tbody></table>';
                        resultHtml += table;

                        const newWindow = window.open();
                        newWindow.document.write('<html><head><title>Fetched Data</title><link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"></head><body>');
                        newWindow.document.write('<div class="container"><h1 class="mt-5">Fetched Data</h1>');
                        newWindow.document.write(resultHtml);
                        newWindow.document.write('</div></body></html>');
                        newWindow.document.close();
                    } else {
                        $('#result').html('<p class="text-warning">No records found.</p>');
                    }
                }).fail(function(xhr){
                    $('#result').html('<p class="text-danger">Error: ' + xhr.responseText + '</p>');
                });
            });

            $('#addForm').submit(function(event){
                event.preventDefault();
                const formData = $(this).serializeArray().reduce((obj, item) => {
                    obj[item.name] = item.value;
                    return obj;
                }, {});

                $.ajax({
                    url: '/data',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(formData),
                    success: function(response){
                        $('#result').html('<p class="text-success">' + response + '</p>');
                    },
                    error: function(xhr){
                        $('#result').html('<p class="text-danger">Error: ' + xhr.responseText + '</p>');
                    }
                });
            });
        });
    </script>
</body>
</html>
